<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ottowa Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFFFFF;
            --secondary: #FFC0CB;
            --text-on-white: #FFC0CB;
            --text-on-pink: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--primary);
            color: var(--text-on-white);
            font-family: 'Noto Serif JP', 'Playfair Display', serif;
            line-height: 1.6;
        }

        header {
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--secondary);
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
        }

        .subtitle {
            font-style: italic;
            margin-top: 0.5rem;
            opacity: 0.8;
        }

        /* Gallery Grid */
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .media-item {
            background: var(--secondary);
            border: 8px solid var(--secondary);
            border-radius: 2px;
            overflow: hidden;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            color: var(--text-on-pink);
        }

        .media-item:hover {
            transform: scale(1.02);
        }

        .media-item img, .media-item video {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
        }

        .media-caption {
            padding: 1rem;
            font-size: 0.8rem;
            text-align: center;
            font-weight: 500;
        }

        footer {
            background-color: var(--secondary);
            color: var(--text-on-pink);
            text-align: center;
            padding: 3rem;
            margin-top: 4rem;
        }

        /* Subtle scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--primary); }
        ::-webkit-scrollbar-thumb { background: var(--secondary); }

    </style>
</head>
<body>

    <header>
        <h1>Ottowa Gallery</h1>
        <p class="subtitle">A Collection of Moments</p>
    </header>

    <main id="gallery">
        <p style="text-align: center; grid-column: 1/-1;">Loading aesthetic content...</p>
    </main>

    <footer>
        <p>&copy; Ottowa Gallery. Elegance in Simplicity.</p>
    </footer>

    <script>
        // --- CONFIGURATION ---
        const repoOwner = 'YOUR_GITHUB_USERNAME'; // Change this
        const repoName = 'YOUR_REPO_NAME';       // Change this
        const folderPath = 'Media'; 

        async function fetchMedia() {
            const gallery = document.getElementById('gallery');
            try {
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`);
                const files = await response.json();

                if (!Array.isArray(files)) throw new Error("Could not find Media folder.");

                gallery.innerHTML = ''; // Clear loading text

                files.forEach(file => {
                    const extension = file.name.split('.').pop().toLowerCase();
                    const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(extension);
                    const isVideo = ['mp4', 'webm', 'ogg'].includes(extension);

                    if (isImage || isVideo) {
                        const card = document.createElement('div');
                        card.className = 'media-item';

                        let mediaHtml = '';
                        if (isImage) {
                            mediaHtml = `<img src="${file.download_url}" alt="${file.name}" loading="lazy">`;
                        } else if (isVideo) {
                            mediaHtml = `<video controls><source src="${file.download_url}" type="video/${extension}"></video>`;
                        }

                        card.innerHTML = `
                            ${mediaHtml}
                            <div class="media-caption">${file.name}</div>
                        `;
                        gallery.appendChild(card);
                    }
                });
            } catch (error) {
                console.error(error);
                gallery.innerHTML = `<p>Failed to load media. Ensure the 'Media' folder exists and repository is public.</p>`;
            }
        }

        fetchMedia();
    </script>
</body>
</html>
